version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: secure_assets
      POSTGRES_PASSWORD: secure_assets
      POSTGRES_DB: secure_assets
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  api:
    image: node:22-alpine
    working_dir: /workspace/apps/api
    volumes: ["./apps/api:/workspace/apps/api"]
    command: sh -c "npm install && npm run dev"
    environment:
      DATABASE_URL: postgresql://secure_assets:secure_assets@postgres:5432/secure_assets
    ports: ["3000:3000"]
    depends_on: [postgres]

  web:
    image: nginx:alpine
    volumes:
      - ./apps/web:/usr/share/nginx/html:ro
    ports: ["5173:80"]

  ai:
    image: python:3.12-slim
    working_dir: /workspace/services/ai
    volumes: ["./services/ai:/workspace/services/ai"]
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports: ["8000:8000"]

volumes:
  postgres_data:
