<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Assets Web</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      body { margin: 0; font-family: "Inter", system-ui, sans-serif; background: #0b0b0f; color: #f5f5f5; }
      .shell { max-width: 900px; margin: 60px auto; padding: 24px; }
      .card { border: 1px solid #2b2b34; border-radius: 16px; padding: 20px; background: #14141b; }
      .accent { color: #d4af37; }
      button { padding: 10px 14px; border: 0; border-radius: 8px; background: #d4af37; color: #111; font-weight: 600; cursor: pointer; }
      pre { white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const e = React.createElement;
      function App() {
        const [data, setData] = React.useState('No search request yet.');
        const fetchSearch = async () => {
          const res = await fetch('http://localhost:3000/api/search');
          const json = await res.json();
          setData(JSON.stringify(json, null, 2));
        };
        return e('div', { className: 'shell' }, [
          e('h1', { className: 'accent', key: 'h' }, 'Secure Assets — Luxury Platform'),
          e('div', { className: 'card', key: 'c' }, [
            e('p', { key: 'p' }, 'React web starter wired to API search endpoint.'),
            e('button', { onClick: fetchSearch, key: 'b' }, 'Load Marketplace Search'),
            e('pre', { key: 'pre' }, data)
          ])
        ]);
      }
      ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    </script>
  </body>
</html>
